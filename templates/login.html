<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Acceso - Importadora Uziel</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #001f3f; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-box { background: white; padding: 40px; border-radius: 8px; box-shadow: 0 15px 25px rgba(0,0,0,0.5); width: 300px; text-align: center; }
        .login-box h2 { color: #003366; margin-bottom: 20px; text-transform: uppercase; }
        input { width: 100%; padding: 12px; margin-bottom: 20px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        .btn-ingresar { width: 100%; background: #27AE60; color: white; border: none; padding: 12px; border-radius: 4px; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        .btn-ingresar:hover { background: #219150; }
        .mensaje { background-color: #E74C3C; color: white; padding: 10px; border-radius: 4px; margin-bottom: 15px; font-size: 14px; }
    </style>
</head>
<body>

    <div class="login-box">
        <h2>🔒 Portal Uziel</h2>
        
        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            {% for category, message in messages %}
              <div class="mensaje" style="{% if category == 'exito' %}background-color: #27AE60;{% endif %}">{{ message }}</div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <form method="POST">
            <input type="text" name="username" placeholder="Usuario (Ej: jefe)" required>
            <input type="password" name="password" placeholder="Contraseña" required>
            <button type="submit" class="btn-ingresar">Ingresar</button>
        </form>
    </div>

</body>
</html>
